name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # npm trusted publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      # No registry-url here: the .npmrc it writes conflicts with
      # semantic-release's own npm auth handling.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Trusted publishing needs npm >= 11.5.1
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bunx vitest run
      - run: bun run build
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
